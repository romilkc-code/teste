<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Financeiro V3.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 240px; background: white; border-right: 1px solid #e1e8ed; padding: 20px 0; display: flex; flex-direction: column; }
        .sidebar-logo { padding: 0 25px 30px; font-weight: 800; color: var(--dark); border-bottom: 1px solid #f0f0f0; }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .top-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .total-display { font-size: 2.5em; font-weight: 800; color: var(--dark); }
        .ticker-group { border: 1px solid #f0f2f5; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        .ticker-header { display: flex; justify-content: space-between; padding: 15px 20px; font-weight: 700; }
        .tag { font-size: 0.6em; padding: 2px 6px; border-radius: 4px; margin-left: 10px; text-transform: uppercase; }
        .tag-xtb { background: #1a1a1a; color: #ffca28; }
        .tag-degiro { background: #e74c3c; color: white; }
        #log { background: #2c3e50; color: #2ecc71; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.75em; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo">FINANCE DASHBOARD</div>
        <button style="margin-top:auto; padding: 15px; cursor:pointer;" onclick="localStorage.clear(); location.reload();">Limpar Memória</button>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div>
                <label style="font-size:0.7em; font-weight:800; color:#999;">DEGIRO (Account.csv)</label><br>
                <input type="file" id="f-degiro">
            </div>
            <div>
                <label style="font-size:0.7em; font-weight:800; color:#999;">XTB (Cash Operations.csv)</label><br>
                <input type="file" id="f-xtb">
            </div>
        </div>

        <div class="card">
            <div style="color: #95a5a6; font-size: 0.8em; font-weight: 700;">TOTAL ACUMULADO</div>
            <div id="totalDiv" class="total-display">0.00€</div>
            <canvas id="chartDiv" style="max-height: 200px; margin-top: 20px;"></canvas>
        </div>

        <div id="list"></div>
        <div id="log">> Aguardando ficheiros...</div>
    </div>

<script>
    let rawData = { degiro: [], xtb: [] };
    let myChart;

    const writeLog = (m) => { document.getElementById('log').innerHTML += `<br>> ${m}`; };

    // PROCESSAR DEGIRO
    document.getElementById('f-degiro').onchange = (e) => {
        Papa.parse(e.target.files[0], { header: true, complete: (res) => {
            rawData.degiro = res.data;
            localStorage.setItem('local_degiro', JSON.stringify(res.data));
            render();
            writeLog("DEGIRO: Carregada.");
        }});
    };

    // PROCESSAR XTB (Ignora as 4 linhas de cabeçalho A1-A4)
    document.getElementById('f-xtb').onchange = (e) => {
        Papa.parse(e.target.files[0], {
            skipEmptyLines: true,
            complete: (res) => {
                // Remove as primeiras 4 linhas (Cabeçalho da conta, datas, etc)
                const actualData = res.data.slice(4); 
                const headers = actualData[0]; // A linha 5 torna-se o cabeçalho
                const rows = actualData.slice(1);

                const formatted = rows.map(r => {
                    let obj = {};
                    headers.forEach((h, i) => obj[h.trim()] = r[i]);
                    return obj;
                });

                rawData.xtb = formatted;
                localStorage.setItem('local_xtb', JSON.stringify(formatted));
                render();
                writeLog(`XTB: ${formatted.length} movimentos processados.`);
            }
        });
    };

    function render() {
        const summary = {}, monthly = {};
        let total = 0;

        // Lógica DEGIRO
        rawData.degiro.forEach(r => {
            const desc = (r['Descrição'] || "").toLowerCase();
            if(desc.includes("dividendo") && !desc.includes("imposto")) {
                const val = parseFloat(Object.values(r).find(v => v?.includes(',') && !isNaN(parseFloat(v.replace('.','').replace(',','.'))))?.replace('.','').replace(',','.') || 0);
                if(val > 0) {
                    const ticker = r['Produto'] || "Outros";
                    add(summary, monthly, ticker, val, r['Data'], 'DEGIRO');
                    total += val;
                }
            }
        });

        // Lógica XTB
        rawData.xtb.forEach(r => {
            if((r['Type'] || "").trim().toLowerCase() === "dividend") {
                const val = parseFloat(r['Amount']?.toString().replace(',','.') || 0);
                if(val > 0) {
                    const date = (r['Time'] || "").split(' ')[0].replace(/\./g, '-');
                    add(summary, monthly, r['Instrument'] || "Outros", val, date, 'XTB');
                    total += val;
                }
            }
        });

        updateUI(total, summary, monthly);
    }

    function add(s, m, t, v, d, b) {
        if(!s[t]) s[t] = { total: 0, broker: b };
        s[t].total += v;
        const mo = d.split(/[-/]/)[1] + '/' + d.split(/[-/]/)[0];
        m[mo] = (m[mo] || 0) + v;
    }

    function updateUI(total, s, m) {
        document.getElementById('totalDiv').innerText = total.toLocaleString('pt-PT', {style:'currency', currency:'EUR'});
        
        const labels = Object.keys(m).sort();
        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('chartDiv'), {
            type: 'bar',
            data: { labels, datasets: [{ label: '€', data: labels.map(l => m[l]), backgroundColor: '#3498db' }] }
        });

        document.getElementById('list').innerHTML = Object.entries(s).sort((a,b) => b[1].total - a[1].total).map(([name, info]) => `
            <div class="ticker-group">
                <div class="ticker-header">
                    <span>${name} <span class="tag tag-${info.broker.toLowerCase()}">${info.broker}</span></span>
                    <span style="color:#3498db">${info.total.toFixed(2)}€</span>
                </div>
            </div>
        `).join('');
    }

    window.onload = () => {
        const d = localStorage.getItem('local_degiro'), x = localStorage.getItem('local_xtb');
        if(d) rawData.degiro = JSON.parse(d);
        if(x) rawData.xtb = JSON.parse(x);
        render();
    };
</script>
</body>
</html>
