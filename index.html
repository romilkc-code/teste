<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Dividendos DEGIRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .stats { display: flex; justify-content: center; margin-bottom: 30px; }
        .stat-card { background: #f8fff9; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #2ecc71; min-width: 250px; }
        .stat-card h3 { margin: 10px 0 0; color: #2ecc71; font-size: 2.5em; }
        input[type="file"] { margin: 20px 0; padding: 20px; border: 2px dashed #2ecc71; width: 100%; border-radius: 8px; cursor: pointer; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>💰 Dashboard de Dividendos</h1>
        <p>Carregue o ficheiro <strong>Account.csv</strong> (ou Transactions) da DEGIRO</p>
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <div class="stats">
        <div class="stat-card">
            <p>Total Recebido (Líquido)</p>
            <h3 id="totalValue">0.00€</h3>
        </div>
    </div>

    <canvas id="dividendChart"></canvas>
</div>

<script>
    let myChart;

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                processData(results.data);
            }
        });
    });

function processData(data) {
    const monthlyData = {};
    let totalGlobal = 0;

    data.forEach((row) => {
        // 1. Identificar se é Dividendo (ignora o "Imposto sobre dividendo")
        const descricao = (row['Descrição'] || "").toLowerCase();
        const isDividendo = descricao === "dividendo"; 
        
        // 2. Capturar o valor
        // No teu CSV, o valor aparece numa coluna sem nome após 'Mudança'
        // Vamos procurar dinamicamente o campo que contém o valor numérico
        let valorBruto = row['Mudança'] || "0";
        
        // Se a coluna 'Mudança' estiver vazia ou for a moeda (USD/EUR), 
        // o PapaParse coloca o número na coluna seguinte.
        // Vamos percorrer os valores da linha para achar o número do dividendo.
        const valoresLinha = Object.values(row);
        const valorNumerico = valoresLinha.find(v => v && v.includes(',') && !isNaN(parseFloat(v.replace(',','.'))));

        if (isDividendo && valorNumerico) {
            // Limpeza do valor (ex: "1,26" -> 1.26)
            const valorTotal = parseFloat(valorNumerico.replace(',', '.'));
            
            // 3. Data (Formato DD-MM-YYYY)
            const dataBruta = row['Data'];
            
            if (!isNaN(valorTotal) && dataBruta) {
                const partes = dataBruta.split('-');
                if (partes.length === 3) {
                    const mesAno = partes[1] + '/' + partes[2]; // MM/YYYY
                    
                    monthlyData[mesAno] = (monthlyData[mesAno] || 0) + valorTotal;
                    totalGlobal += valorTotal;
                }
            }
        }
    });

    // Ordenação Cronológica
    const sortedKeys = Object.keys(monthlyData).sort((a, b) => {
        const [m1, y1] = a.split('/').map(Number);
        const [m2, y2] = b.split('/').map(Number);
        return new Date(y1, m1 - 1) - new Date(y2, m2 - 1);
    });

    if (totalGlobal === 0) {
        alert("Não foram encontrados dividendos. Verifique se o ficheiro está correto.");
    }

    updateDashboard(totalGlobal, sortedKeys, sortedKeys.map(k => monthlyData[k].toFixed(2)));
}
    function updateDashboard(total, labels, values) {
        document.getElementById('totalValue').innerText = total.toLocaleString('pt-PT', { style: 'currency', currency: 'EUR' });
        const ctx = document.getElementById('dividendChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Dividendos Mensais (€)',
                    data: values,
                    backgroundColor: '#2ecc71'
                }]
            }
        });
    }
</script>
</body>
</html>
