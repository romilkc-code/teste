<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Finance Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-emerald: #10b981;
            --border: #334155;
            --sidebar-w: 260px;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main);
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        .sidebar { 
            width: var(--sidebar-w); 
            background: var(--bg-card); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 24px;
        }
        .sidebar-logo { 
            font-weight: 700; 
            font-size: 1.25rem; 
            color: var(--primary); 
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn { 
            padding: 12px 16px; 
            cursor: pointer; 
            border: none; 
            background: transparent; 
            text-align: left; 
            font-size: 0.9rem; 
            font-weight: 500; 
            color: var(--text-dim); 
            border-radius: 8px;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .nav-btn:hover { background: #334155; color: var(--text-main); }
        .nav-btn.active { background: var(--primary); color: #000; font-weight: 600; }

        .clear-nav { 
            margin-top: auto; 
            color: #fb7185; 
            padding: 12px; 
            cursor: pointer; 
            font-size: 0.8rem; 
            background: #4c1d24;
            border: none;
            border-radius: 8px;
            text-align: center;
        }

        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .tab-content { display: none; max-width: 1100px; margin: auto; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card { 
            background: var(--bg-card); 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .metric-label { font-size: 0.75rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .metric-value { font-size: 2rem; font-weight: 700; margin: 8px 0; color: var(--text-main); }

        .upload-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .upload-field {
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed var(--border);
        }
        .upload-field label { display: block; font-size: 0.65rem; color: var(--primary); margin-bottom: 8px; font-weight: 700; }
        input[type="file"] { font-size: 0.7rem; color: var(--text-dim); width: 100%; }

        .ticker-group { 
            background: #1e293b; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .ticker-group:hover { border-color: var(--primary); background: #26334d; }
        .ticker-header { display: flex; justify-content: space-between; padding: 16px 20px; align-items: center; }
        .ticker-name { font-weight: 600; font-size: 1rem; }
        .ticker-total { color: var(--primary); font-weight: 700; }

        .broker-tag { font-size: 0.6rem; padding: 3px 8px; border-radius: 4px; margin-left: 10px; font-weight: 800; }
        .tag-degiro { background: #334155; color: #cbd5e1; }
        .tag-xtb { background: #0ea5e9; color: #000; }

        .ticker-details { display: none; padding: 0 20px 16px; border-top: 1px solid var(--border); }
        .ticker-group.open .ticker-details { display: block; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.85rem; color: var(--text-dim); border-bottom: 1px solid #334155; }

        .chart-container { height: 300px; width: 100%; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo"><span>💎</span> FinInsights</div>
        <button class="nav-btn active" onclick="switchTab('tab-div', this)">💰 Dividendos</button>
        <button class="nav-btn" onclick="switchTab('tab-port', this)">📊 Portefólio</button>
        <button class="clear-nav" onclick="clearData()">Limpar Memória</button>
    </div>

    <div class="main-content">
        <div class="upload-section">
            <div class="upload-field"><label>DEGIRO ACCOUNT</label>
