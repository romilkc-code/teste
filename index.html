<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Dividendos DEGIRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .stats { display: flex; justify-content: center; margin-bottom: 20px; }
        .stat-card { background: #f8fff9; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #2ecc71; min-width: 250px; }
        .stat-card h3 { margin: 10px 0 0; color: #2ecc71; font-size: 2.5em; }
        .filter-container { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; display: none; flex-wrap: wrap; }
        .filter-group { text-align: left; flex: 1; min-width: 200px; max-width: 300px; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 100%; font-size: 14px; background: white; }
        input[type="file"] { margin: 20px 0; padding: 20px; border: 2px dashed #2ecc71; width: 100%; border-radius: 8px; cursor: pointer; box-sizing: border-box; }
        label { font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>💰 Dashboard de Dividendos</h1>
        <p>Carregue o ficheiro <strong>Account.csv</strong> da DEGIRO</p>
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <div class="filter-container" id="filterSection">
        <div class="filter-group">
            <label for="productFilter">Ação:</label>
            <select id="productFilter">
                <option value="all">Todas as Ações</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="yearFilter">Ano:</label>
            <select id="yearFilter">
                <option value="all">Todos os Anos</option>
            </select>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <p>Total Selecionado</p>
            <h3 id="totalValue">0.00€</h3>
        </div>
    </div>

    <canvas id="dividendChart"></canvas>
</div>

<script>
    let myChart;
    let allRawData = [];

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allRawData = results.data;
                setupFilters(results.data);
                processData();
                document.getElementById('filterSection').style.display = 'flex';
            }
        });
    });

    document.getElementById('productFilter').addEventListener('change', processData);
    document.getElementById('yearFilter').addEventListener('change', processData);

    function setupFilters(data) {
        const productSelect = document.getElementById('productFilter');
        const yearSelect = document.getElementById('yearFilter');
        const produtos = new Set();
        const anos = new Set();

        data.forEach(row => {
            const desc = (row['Descrição'] || "").toLowerCase();
            const produto = row['Produto'];
            const dataBruta = row['Data'];

            if (desc === "dividendo" && produto && dataBruta) {
                produtos.add(produto);
                const ano = dataBruta.split('-')[2];
                if(ano) anos.add(ano);
            }
        });

        // Preencher Ações
        productSelect.innerHTML = '<option value="all">Todas as Ações</option>';
        Array.from(produtos).sort().forEach(prod => {
            const opt = document.createElement('option');
            opt.value = prod; opt.text = prod;
            productSelect.appendChild(opt);
        });

        // Preencher Anos
        yearSelect.innerHTML = '<option value="all">Todos os Anos</option>';
        Array.from(anos).sort((a, b) => b - a).forEach(ano => {
            const opt = document.createElement('option');
            opt.value = ano; opt.text = ano;
            yearSelect.appendChild(opt);
        });
    }

    function processData() {
        const monthlyData = {};
        let totalGlobal = 0;
        const selectedProduct = document.getElementById('productFilter').value;
        const selectedYear = document.getElementById('yearFilter').value;

        allRawData.forEach((row) => {
            const descricao = (row['Descrição'] || "").toLowerCase();
            const produto = row['Produto'];
            const dataBruta = row['Data'] || "";
            const isDividendo = (descricao === "dividendo");

            if (isDividendo && dataBruta) {
                const partesData = dataBruta.split('-');
                const ano = partesData[2];
                const mesAno = partesData[1] + '/' + partesData[2];

                const matchesProduct = (selectedProduct === "all" || produto === selectedProduct);
                const matchesYear = (selectedYear === "all" || ano === selectedYear);

                if (matchesProduct && matchesYear) {
                    const valoresLinha = Object.values(row);
                    const valorNumerico = valoresLinha.find(v => v && v.includes(',') && !isNaN(parseFloat(v.replace(',','.'))));
                    
                    if (valorNumerico) {
                        const valorTotal = parseFloat(valorNumerico.replace(',', '.'));
                        monthlyData[mesAno] = (monthlyData[mesAno] || 0) + valorTotal;
                        totalGlobal += valorTotal;
                    }
                }
            }
        });

        const sortedKeys = Object.keys(monthlyData).sort((a, b) => {
            const [m1, y1] = a.split('/').map(Number);
            const [m2, y2] = b.split('/').map(Number);
            return new Date(y1, m1 - 1) - new Date(y2, m2 - 1);
        });

        updateDashboard(totalGlobal, sortedKeys, sortedKeys.map(k => monthlyData[k].toFixed(2)));
    }

    function updateDashboard(total, labels, values) {
        document.getElementById('totalValue').innerText = total.toLocaleString('pt-PT', { style: 'currency', currency: 'EUR' });
        const ctx = document.getElementById('dividendChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Dividendos (€)',
                    data: values,
                    backgroundColor: '#2ecc71',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });
    }
</script>
</body>
</html>
