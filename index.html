<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Finance Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-emerald: #10b981;
            --border: #334155;
            --sidebar-w: 260px;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main);
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        .sidebar { 
            width: var(--sidebar-w); 
            background: var(--bg-card); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 24px;
        }
        .sidebar-logo { 
            font-weight: 700; 
            font-size: 1.25rem; 
            color: var(--primary); 
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn { 
            padding: 12px 16px; 
            cursor: pointer; 
            border: none; 
            background: transparent; 
            text-align: left; 
            font-size: 0.9rem; 
            font-weight: 500; 
            color: var(--text-dim); 
            border-radius: 8px;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .nav-btn:hover { background: #334155; color: var(--text-main); }
        .nav-btn.active { background: var(--primary); color: #000; font-weight: 600; }

        .clear-nav { 
            margin-top: auto; 
            color: #fb7185; 
            padding: 12px; 
            cursor: pointer; 
            font-size: 0.8rem; 
            background: #4c1d24;
            border: none;
            border-radius: 8px;
            text-align: center;
        }

        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .tab-content { display: none; max-width: 1100px; margin: auto; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card { 
            background: var(--bg-card); 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .metric-label { font-size: 0.75rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .metric-value { font-size: 2rem; font-weight: 700; margin: 8px 0; color: var(--text-main); }

        .upload-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .upload-field {
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed var(--border);
        }
        .upload-field label { display: block; font-size: 0.65rem; color: var(--primary); margin-bottom: 8px; font-weight: 700; }
        input[type="file"] { font-size: 0.7rem; color: var(--text-dim); width: 100%; }

        .filter-select {
            background: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .ticker-group { background: #1e293b; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; cursor: pointer; }
        .ticker-header { display: flex; justify-content: space-between; padding: 16px 20px; align-items: center; }
        .ticker-name { font-weight: 600; font-size: 1rem; }
        .ticker-total { color: var(--primary); font-weight: 700; }
        .broker-tag { font-size: 0.6rem; padding: 3px 8px; border-radius: 4px; margin-left: 10px; font-weight: 800; }
        .tag-degiro { background: #334155; color: #cbd5e1; }
        .tag-xtb { background: #0ea5e9; color: #000; }
        .ticker-details { display: none; padding: 0 20px 16px; border-top: 1px solid var(--border); }
        .ticker-group.open .ticker-details { display: block; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.85rem; color: var(--text-dim); border-bottom: 1px solid #334155; }

        .chart-container { height: 300px; width: 100%; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo"><span>💎</span> FinInsights</div>
        <button class="nav-btn active" onclick="switchTab('tab-div', this)">💰 Dividendos</button>
        <button class="nav-btn" onclick="switchTab('tab-port', this)">📊 Portefólio</button>
        <button class="clear-nav" onclick="clearData()">Limpar Memória</button>
    </div>

    <div class="main-content">
        <div class="upload-section">
            <div class="upload-field"><label>DEGIRO ACCOUNT</label><input type="file" id="fileDegiro"></div>
            <div class="upload-field"><label>XTB CASH OPS</label><input type="file" id="fileXtb"></div>
            <div class="upload-field"><label>PORTFOLIO CSV</label><input type="file" id="filePortfolio"></div>
        </div>

        <div id="tab-div" class="tab-content active">
            <div class="metrics-grid">
                <div class="card">
                    <div class="metric-label">Dividendos Acumulados</div>
                    <div id="totalDivValue" class="metric-value">0,00 €</div>
                </div>
            </div>
            <div class="card" style="margin-bottom: 30px;">
                <div class="metric-label">Evolução Mensal</div>
                <div class="chart-container"><canvas id="chartDiv"></canvas></div>
            </div>
            <div id="dividendTickerContainer"></div>
        </div>

        <div id="tab-port" class="tab-content">
            <div class="metrics-grid">
                <div class="card">
                    <div class="metric-label">Valor Total Portefólio</div>
                    <div id="totalPortValue" class="metric-value">0,00 €</div>
                </div>
            </div>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div class="metric-label">Alocação de Ativos</div>
                    <select id="portfolioFilter" class="filter-select" onchange="applyPortfolioFilter()">
                        <option value="all">Todos os Ativos</option>
                        <option value="stocks">Ações</option>
                        <option value="etfs">ETFs</option>
                        <option value="commodities">Commodities</option>
                    </select>
                </div>
                <div style="height: 400px; margin-top: 20px; position: relative;">
                    <canvas id="chartPort"></canvas>
                </div>
                
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 0 10px; margin-top: 40px; color: var(--text-dim); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                    <span>Ativo</span>
                    <span style="text-align: center;">Ticker</span>
                    <span style="text-align: right;">Valor</span>
                </div>
                <div id="portfolioListContainer" style="margin-top: 10px;"></div>
            </div>
        </div>
    </div>

<script>
    let chartDiv, chartPort;
    let dividendsData = { degiro: [], xtb: [] };
    let currentPortfolioData = [];

    function parseLocaleNumber(val) {
        if (!val) return 0;
        let s = val.toString().trim().replace('€', '').replace('$', '').trim();
        // Se tiver vírgula, é formato europeu (ex: 1.234,56 ou 1234,56)
        if (s.includes(',')) {
            s = s.replace(/\./g, '').replace(',', '.');
        }
        return parseFloat(s) || 0;
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    window.onload = () => {
        const d = localStorage.getItem('divs_degiro'), x = localStorage.getItem('divs_xtb'), p = localStorage.getItem('port_data');
        if(d) dividendsData.degiro = JSON.parse(d);
        if(x) dividendsData.xtb = JSON.parse(x);
        if(p) { currentPortfolioData = JSON.parse(p); processPortfolio(currentPortfolioData, false); }
        if(d || x) processAllDividends();
    };

    function clearData() { if(confirm("Apagar todos os dados?")) { localStorage.clear(); location.reload(); } }

    document.getElementById('fileDegiro').onchange = (e) => {
        Papa.parse(e.target.files[0], { header: true, complete: (res) => { 
            dividendsData.degiro = res.data;
            localStorage.setItem('divs_degiro', JSON.stringify(res.data));
            processAllDividends();
        }});
    };

    document.getElementById('fileXtb').onchange = (e) => {
        Papa.parse(e.target.files[0], { 
            header: true, skipEmptyLines: true,
            beforeFirstChunk: (chunk) => {
                const lines = chunk.split(/\r\n|\r|\n/);
                const idx = lines.findIndex(l => l.toLowerCase().includes("type") && l.toLowerCase().includes("amount"));
                return idx !== -1 ? lines.slice(idx).join("\n") : chunk;
            },
            complete: (res) => {
                dividendsData.xtb = res.data.filter(r => r.Type && r.Amount);
                localStorage.setItem('divs_xtb', JSON.stringify(dividendsData.xtb));
                processAllDividends();
            }
        });
    };

    document.getElementById('filePortfolio').onchange = (e) => {
        Papa.parse(e.target.files[0], { header: true, skipEmptyLines: true, complete: (res) => {
            currentPortfolioData = res.data;
            processPortfolio(res.data, true);
        }});
    };

    function updateStats(ticker, val, date, broker, summary, monthly) {
        if(!summary[ticker]) summary[ticker] = { total: 0, broker, dates: [] };
        summary[ticker].total += val;
        summary[ticker].dates.push({ date, val });
        const parts = date.split(/[-/.]/);
        // Tenta extrair MM/AAAA
        const ma = (parts.length >= 2) ? `${parts[1]}/${parts[0].length === 4 ? parts[0] : parts[2]}` : "Outros";
        monthly[ma] = (monthly[ma] || 0) + val;
    }

    function processAllDividends() {
        const monthly = {}, tickerSummary = {};
        let totalGlobal = 0;

        // Processar DEGIRO
        dividendsData.degiro.forEach(r => {
            const desc = (r['Descrição'] || "").toLowerCase();
            if(desc.includes("dividendo") && !desc.includes("imposto")) {
                let val = 0;
                // Procura o valor numa coluna numérica
                const possibleKeys = ['Valor', 'Montante', 'EUR', 'Amount'];
                for(let k of possibleKeys) { if(r[k]) { val = parseLocaleNumber(r[k]); if(val !== 0) break; } }
                
                if(val > 0) {
                    updateStats(r['Produto'] || "Outros", val, r['Data'] || "", 'DEGIRO', tickerSummary, monthly);
                    totalGlobal += val;
                }
            }
        });

        // Processar XTB
        dividendsData.xtb.forEach(r => {
            if((r['Type'] || "").trim() === "Dividend") {
                const val = parseLocaleNumber(r['Amount']);
                if(val > 0) {
                    const rawDate = (r['Time'] || "").split(' ')[0];
                    updateStats((r['Instrument'] || "Outros").trim(), val, rawDate, 'XTB', tickerSummary, monthly);
                    totalGlobal += val;
                }
            }
        });

        renderDividendUI(totalGlobal, monthly, tickerSummary);
    }

    function renderDividendUI(total, monthly, summary) {
        document.getElementById('totalDivValue').innerText = total.toLocaleString('pt-PT',{style:'currency',currency:'EUR'});
        const sortedMonths = Object.keys(monthly).sort();
        
        if(chartDiv) chartDiv.destroy();
        chartDiv = new Chart(document.getElementById('chartDiv'), {
            type:'bar',
            data: { labels: sortedMonths, datasets:[{ label:'Euros', data: sortedMonths.map(m=>monthly[m].toFixed(2)), backgroundColor:'#38bdf8', borderRadius:5 }] },
            options: { maintainAspectRatio:false, plugins:{legend:{display:false}} }
        });

        document.getElementById('dividendTickerContainer').innerHTML = Object.entries(summary).sort((a,b)=>b[1].total-a[1].total).map(([name, info]) => `
            <div class="ticker-group" onclick="this.classList.toggle('open')">
                <div class="ticker-header">
                    <span class="ticker-name">${name} <span class="broker-tag ${info.broker==='XTB'?'tag-xtb':'tag-degiro'}">${info.broker}</span></span>
                    <span class="ticker-total">${info.total.toLocaleString('pt-PT', {minimumFractionDigits:2})}€</span>
                </div>
                <div class="ticker-details">
                    ${info.dates.map(d=>`<div class="detail-row"><span>${d.date}</span><strong>+${d.val.toFixed(2)}€</strong></div>`).join('')}
                </div>
            </div>
        `).join('');
    }

    function applyPortfolioFilter() { processPortfolio(currentPortfolioData, false); }

    function processPortfolio(data, save) {
        if(!data || data.length === 0) return;
        if(save) localStorage.setItem('port_data', JSON.stringify(data));
        
        const filterValue = document.getElementById('portfolioFilter').value;
        let totalGlobal = 0, filteredTotal = 0;
        const assets = [];

        const specificETFTickers = ['EQQB', 'QDVE', 'SXR8', 'VGWD', 'VUSA', 'VWCE', 'IE00B8GKDB10', 'IE00B3WJKG14', 'VNGRD FTSE ALL-WLD', 'ISHARES S&P 500 INFO'];

        data.forEach(r => {
            const nome = r['Produto'] || "";
            const ticker = r['Ticker / ISIN'] || "---";
            const valor = parseLocaleNumber(r['Valor em EUR']);

            if(nome && valor > 0) {
                totalGlobal += valor;
                const isCommodity = nome.toLowerCase().includes("gold") || nome.toLowerCase().includes("silver") || ticker.includes("XAU") || ticker.includes("XAG");
                const isETF = nome.toLowerCase().includes("etf") || nome.toLowerCase().includes("ucits") || specificETFTickers.some(t => ticker.includes(t)) || specificETFTickers.some(t => nome.toUpperCase().includes(t.toUpperCase()));
                
                let match = false;
                if(filterValue === 'all') match = true;
                else if(filterValue === 'stocks' && !isETF && !isCommodity && !nome.includes("CASH")) match = true;
                else if(filterValue === 'etfs' && isETF) match = true;
                else if(filterValue === 'commodities' && isCommodity) match = true;

                if(match && !nome.includes("CASH")) {
                    assets.push({ n: nome, t: ticker, v: valor });
                    filteredTotal += valor;
                }
            }
        });

        assets.sort((a, b) => b.v - a.v);
        document.getElementById('totalPortValue').innerText = totalGlobal.toLocaleString('pt-PT', {style:'currency', currency:'EUR'});

        if(chartPort) chartPort.destroy();
        chartPort = new Chart(document.getElementById('chartPort'), {
            type: 'doughnut',
            data: {
                labels: assets.map(a => a.n),
                datasets: [{
                    data: assets.map(a => a.v),
                    backgroundColor: ['#38bdf8','#818cf8','#fb7185','#34d399','#fbbf24','#a78bfa','#f472b6','#10b981','#6366f1','#ec4899'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '75%', maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        document.getElementById('portfolioListContainer').innerHTML = assets.map(a => {
            const pct = ((a.v / (filteredTotal || 1)) * 100).toFixed(1);
            return `
                <div style="margin-bottom:18px">
                    <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; font-size:0.85rem; margin-bottom:8px; align-items:center;">
                        <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right:10px;">${a.n}</span>
                        <span style="color:var(--text-dim); font-family:monospace; text-align:center; font-size:0.75rem;">${a.t}</span>
                        <span style="text-align: right;"><strong>${a.v.toLocaleString('pt-PT', {minimumFractionDigits:2})}€</strong></span>
                    </div>
                    <div style="background:var(--border); height:4px; border-radius:2px; overflow:hidden">
                        <div style="width:${pct}%; background:var(--primary); height:100%"></div>
                    </div>
                </div>`;
        }).join('');
    }
</script>
</body>
</html>
