<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Finance Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-emerald: #10b981;
            --border: #334155;
            --sidebar-w: 260px;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main);
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sidebar */
        .sidebar { 
            width: var(--sidebar-w); 
            background: var(--bg-card); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 24px;
        }
        .sidebar-logo { 
            font-weight: 700; 
            font-size: 1.25rem; 
            color: var(--primary); 
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn { 
            padding: 12px 16px; 
            cursor: pointer; 
            border: none; 
            background: transparent; 
            text-align: left; 
            font-size: 0.9rem; 
            font-weight: 500; 
            color: var(--text-dim); 
            border-radius: 8px;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .nav-btn:hover { background: #334155; color: var(--text-main); }
        .nav-btn.active { background: var(--primary); color: #000; font-weight: 600; }

        .clear-nav { 
            margin-top: auto; 
            color: #fb7185; 
            padding: 12px; 
            cursor: pointer; 
            font-size: 0.8rem; 
            background: #4c1d24;
            border: none;
            border-radius: 8px;
            text-align: center;
        }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .tab-content { display: none; max-width: 1100px; margin: auto; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card { 
            background: var(--bg-card); 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .metric-label { font-size: 0.75rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .metric-value { font-size: 2rem; font-weight: 700; margin: 8px 0; color: var(--text-main); }

        /* Upload Area */
        .upload-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .upload-field {
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed var(--border);
        }
        .upload-field label { display: block; font-size: 0.65rem; color: var(--primary); margin-bottom: 8px; font-weight: 700; }
        input[type="file"] { font-size: 0.7rem; color: var(--text-dim); width: 100%; }

        /* Ticker Groups */
        .ticker-group { 
            background: #1e293b; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .ticker-group:hover { border-color: var(--primary); background: #26334d; }
        .ticker-header { display: flex; justify-content: space-between; padding: 16px 20px; align-items: center; }
        .ticker-name { font-weight: 600; font-size: 1rem; }
        .ticker-total { color: var(--primary); font-weight: 700; }

        .broker-tag { font-size: 0.6rem; padding: 3px 8px; border-radius: 4px; margin-left: 10px; font-weight: 800; }
        .tag-degiro { background: #334155; color: #cbd5e1; }
        .tag-xtb { background: #0ea5e9; color: #000; }

        .ticker-details { display: none; padding: 0 20px 16px; border-top: 1px solid var(--border); }
        .ticker-group.open .ticker-details { display: block; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.85rem; color: var(--text-dim); border-bottom: 1px solid #334155; }

        .chart-container { height: 300px; width: 100%; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo"><span>💎</span> FinInsights</div>
        <button class="nav-btn active" onclick="switchTab('tab-div', this)">💰 Dividendos</button>
        <button class="nav-btn" onclick="switchTab('tab-port', this)">📊 Portefólio</button>
        <button class="clear-nav" onclick="clearData()">Limpar Memória</button>
    </div>

    <div class="main-content">
        <div class="upload-section">
            <div class="upload-field"><label>DEGIRO ACCOUNT</label><input type="file" id="fileDegiro"></div>
            <div class="upload-field"><label>XTB CASH OPS</label><input type="file" id="fileXtb"></div>
            <div class="upload-field"><label>PORTFOLIO CSV</label><input type="file" id="filePortfolio"></div>
        </div>

        <div id="tab-div" class="tab-content active">
            <div class="metrics-grid">
                <div class="card">
                    <div class="metric-label">Dividendos Acumulados</div>
                    <div id="totalDivValue" class="metric-value">0,00 €</div>
                </div>
                <div class="card">
                    <div class="metric-label">Melhor Mês</div>
                    <div id="bestMonthValue" class="metric-value" style="color: var(--accent-emerald);">---</div>
                </div>
            </div>

            <div class="card" style="margin-bottom: 30px;">
                <div class="metric-label">Evolução Mensal</div>
                <div class="chart-container">
                    <canvas id="chartDiv"></canvas>
                </div>
            </div>

            <h3 style="font-size: 1rem; margin-bottom: 20px; color: var(--text-dim)">Detalhamento por Ativo</h3>
            <div id="dividendTickerContainer"></div>
        </div>

        <div id="tab-port" class="tab-content">
            <div class="metrics-grid">
                <div class="card">
                    <div class="metric-label">Valor Total Portefólio</div>
                    <div id="totalPortValue" class="metric-value">0,00 €</div>
                </div>
            </div>
            <div class="card">
                <div class="metric-label">Alocação de Ativos</div>
                <div style="height: 350px;">
                    <canvas id="chartPort"></canvas>
                </div>
                <div id="portfolioListContainer" style="margin-top: 30px;"></div>
            </div>
        </div>
    </div>

<script>
    let chartDiv, chartPort;
    let dividendsData = { degiro: [], xtb: [] };
    
    // Configurações Globais do Chart.js para Dark Mode
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.borderColor = '#334155';

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    window.onload = () => {
        const d = localStorage.getItem('divs_degiro'), x = localStorage.getItem('divs_xtb'), p = localStorage.getItem('port_data');
        if(d) dividendsData.degiro = JSON.parse(d);
        if(x) dividendsData.xtb = JSON.parse(x);
        if(d || x) processAllDividends();
        if(p) processPortfolio(JSON.parse(p), false);
    };

    function clearData() { if(confirm("Apagar todos os dados guardados?")) { localStorage.clear(); location.reload(); } }

    document.getElementById('fileDegiro').onchange = (e) => {
        Papa.parse(e.target.files[0], { header: true, complete: (res) => { 
            dividendsData.degiro = res.data;
            localStorage.setItem('divs_degiro', JSON.stringify(res.data));
            processAllDividends();
        }});
    };

    document.getElementById('fileXtb').onchange = (e) => {
        Papa.parse(e.target.files[0], { 
            header: true, 
            skipEmptyLines: true,
            beforeFirstChunk: function(chunk) {
                const lines = chunk.split(/\r\n|\r|\n/);
                const headerIndex = lines.findIndex(line => line.toLowerCase().includes("type") && line.toLowerCase().includes("amount"));
                return headerIndex !== -1 ? lines.slice(headerIndex).join("\n") : chunk;
            },
            complete: (res) => {
                const cleanData = res.data.filter(r => r.Type && r.Amount);
                dividendsData.xtb = cleanData;
                localStorage.setItem('divs_xtb', JSON.stringify(cleanData));
                processAllDividends();
            }
        });
    };

    function processAllDividends() {
        const monthly = {}, tickerSummary = {};
        let totalGlobal = 0;

        dividendsData.degiro.forEach(r => {
            const desc = (r['Descrição']||"").toLowerCase();
            if(desc.includes("dividendo") && !desc.includes("imposto") && !desc.includes("retido")) {
                const val = parseFloat(Object.values(r).find(v => v?.includes(',') && !isNaN(parseFloat(v.replace('.','').replace(',','.'))))?.replace('.','').replace(',','.') || 0);
                if(val <= 0) return;
                updateStats(r['Produto'] || "Outros", val, r['Data'] || "", 'DEGIRO', tickerSummary, monthly);
                totalGlobal += val;
            }
        });

        dividendsData.xtb.forEach(r => {
            if((r['Type'] || "").trim() === "Dividend") {
                const val = parseFloat((r['Amount'] || "0").toString().replace(',', '.'));
                if(isNaN(val) || val <= 0) return;
                const fullTime = (r['Time'] || "").split(' ')[0];
                const p = fullTime.split('-');
                const dateFormatted = p.length === 3 ? `${p[2]}-${p[1]}-${p[0]}` : fullTime;
                updateStats((r['Instrument'] || "Outros").trim(), val, dateFormatted, 'XTB', tickerSummary, monthly);
                totalGlobal += val;
            }
        });

        renderDividendUI(totalGlobal, monthly, tickerSummary);
    }

    function updateStats(ticker, val, date, broker, summary, monthly) {
        if(!summary[ticker]) summary[ticker] = { total: 0, broker, dates: [] };
        summary[ticker].total += val;
        summary[ticker].dates.push({ date, val });
        const parts = date.split(/[-/.]/);
        const ma = parts.length >= 3 ? `${parts[1]}/${parts[2]}` : "Outros"; 
        monthly[ma] = (monthly[ma] || 0) + val;
    }

    function renderDividendUI(total, monthly, summary) {
        document.getElementById('totalDivValue').innerText = total.toLocaleString('pt-PT',{style:'currency',currency:'EUR'});
        
        const labs = Object.keys(monthly).sort((a, b) => {
            const [m1, y1] = a.split('/').map(Number), [m2, y2] = b.split('/').map(Number);
            return y1 !== y2 ? y1 - y2 : m1 - m2;
        });

        const monthValues = labs.map(l => monthly[l]);
        const maxMonth = Math.max(...monthValues, 0);
        document.getElementById('bestMonthValue').innerText = maxMonth > 0 ? maxMonth.toLocaleString('pt-PT',{style:'currency',currency:'EUR'}) : "---";

        if(chartDiv) chartDiv.destroy();
        chartDiv = new Chart(document.getElementById('chartDiv'), { 
            type:'bar', 
            data: { 
                labels: labs, 
                datasets:[{
                    label:'Dividendos Mensais', 
                    data: monthValues.map(v => v.toFixed(2)), 
                    backgroundColor:'#38bdf8', 
                    borderRadius: 6,
                    hoverBackgroundColor: '#7dd3fc'
                }] 
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        const sorted = Object.entries(summary).sort((a,b) => b[1].total - a[1].total);
        document.getElementById('dividendTickerContainer').innerHTML = sorted.map(([name, info]) => `
            <div class="ticker-group" onclick="this.classList.toggle('open')">
                <div class="ticker-header">
                    <span class="ticker-name">${name} <span class="broker-tag ${info.broker === 'XTB' ? 'tag-xtb' : 'tag-degiro'}">${info.broker}</span></span>
                    <span class="ticker-total">${info.total.toLocaleString('pt-PT',{minimumFractionDigits:2})}€</span>
                </div>
                <div class="ticker-details">
                    ${info.dates.sort((a,b) => new Date(b.date.split('-').reverse().join('-')) - new Date(a.date.split('-').reverse().join('-')))
                        .map(d => `<div class="detail-row"><span>${d.date}</span><strong>+${d.val.toFixed(2)}€</strong></div>`).join('')}
                </div>
            </div>
        `).join('');
    }

    function processPortfolio(data, save) {
        if(save) localStorage.setItem('port_data', JSON.stringify(data));
        let total = 0; const assets = [];
        data.forEach(r => {
            const p = r['Produto'], col = Object.keys(r), v = parseFloat((r[col[col.length-1]]||"0").replace('.','').replace(',','.'));
            if(p && !p.includes("CASH") && v > 0) { assets.push({ n: p, v }); total += v; }
        });
        assets.sort((x, y) => y.v - x.v);
        document.getElementById('totalPortValue').innerText = total.toLocaleString('pt-PT',{style:'currency',currency:'EUR'});
        
        if(chartPort) chartPort.destroy();
        chartPort = new Chart(document.getElementById('chartPort'), {
            type: 'doughnut', 
            data: { 
                labels: assets.map(x=>x.n), 
                datasets:[{ data: assets.map(x=>x.v), backgroundColor: ['#38bdf8','#818cf8','#fb7185','#34d399','#fbbf24','#a78bfa'], borderWeight: 0 }]
            },
            options: { cutout: '80%', maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, padding: 20 } } } }
        });

        document.getElementById('portfolioListContainer').innerHTML = assets.map((x) => {
            const pct = ((x.v / total) * 100).toFixed(1);
            return `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:6px"><span>${x.n}</span><span style="color:var(--text-dim)">${pct}%</span></div><div style="background:#334155;height:4px;border-radius:2px"><div style="width:${pct}%;background:var(--primary);height:100%;border-radius:2px"></div></div></div>`;
        }).join('');
    }
</script>
</body>
</html>
