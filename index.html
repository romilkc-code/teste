<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard DEGIRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #333; --header-bg: #fff; --border: #eee; }
        [data-theme="dark"] { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --header-bg: #1e1e1e; --border: #333; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 20px; color: var(--text-color); transition: 0.3s; }
        .container { max-width: 1200px; margin: auto; }
        .top-bar { display: flex; justify-content: space-between; background: var(--header-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); align-items: center; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
        
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .allocation-menu { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; }
        .alloc-btn { background: none; border: 1px solid var(--border); color: var(--text-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75em; }
        .alloc-btn.active { background: #2ecc71; color: white; border-color: #2ecc71; }
        
        /* Estilo da Tabela de Preços Atuais */
        .market-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        .market-table th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: #2ecc71; }
        .market-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .up { color: #2ecc71; font-weight: bold; }
        .down { color: #e74c3c; font-weight: bold; }
        
        .theme-btn { cursor: pointer; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-color); }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <div class="top-bar">
        <div><label style="font-size:0.7em; font-weight:bold; color:#2ecc71">ACCOUNT.CSV</label><br><input type="file" id="fileDiv"></div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
        <div style="text-align: right;"><label style="font-size:0.7em; font-weight:bold; color:#2ecc71">PORTFOLIO.CSV</label><br><input type="file" id="filePort"></div>
    </div>

    <div class="dashboard-grid">
        <div class="card" id="cardDiv" style="display:none;">
            <h2>💰 Dividendos</h2>
            <canvas id="chartDiv"></canvas>
        </div>

        <div class="card" id="cardPort" style="display:none;">
            <div class="allocation-menu">
                <button class="alloc-btn active" onclick="changeAlloc('positions', this)">Positions</button>
                <button class="alloc-btn" onclick="changeAlloc('type', this)">Type</button>
            </div>
            <canvas id="chartPort"></canvas>
        </div>
    </div>

    <div class="card" id="marketCard" style="display:none;">
        <h2>🚀 Market Watch (Live Prices)</h2>
        <p style="font-size: 0.8em; color: #888;">Preços aproximados via Yahoo Finance</p>
        <table class="market-table">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Preço CSV</th>
                    <th>Preço Atual</th>
                    <th>Variação</th>
                </tr>
            </thead>
            <tbody id="marketBody"></tbody>
        </table>
    </div>
</div>

<script>
    let portItems = [];

    // Função para alternar o tema
    function toggleTheme() {
        const b = document.body;
        const t = b.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        b.setAttribute('data-theme', t);
        document.getElementById('themeBtn').innerText = t === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode';
    }

    document.getElementById('filePort').addEventListener('change', e => {
        Papa.parse(e.target.files[0], { header: true, skipEmptyLines: true, complete: r => {
            portItems = [];
            const tbody = document.getElementById('marketBody');
            tbody.innerHTML = "";

            r.data.forEach(row => {
                const name = row['Produto'] || "";
                const isinTicker = row['Ticker / ISIN'] || "";
                const cols = Object.keys(row);
                const csvPrice = parseFloat((row['Preço'] || "0").replace(/\./g,'').replace(',','.'));
                
                if(name && !name.includes("CASH") && csvPrice > 0) {
                    portItems.push({ name, ticker: isinTicker.split(' ')[0], csvPrice });
                    
                    // Adicionar linha na tabela
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${name}</td>
                        <td>${csvPrice.toFixed(2)}€</td>
                        <td id="price-${isinTicker}">Carregando...</td>
                        <td id="change-${isinTicker}">-</td>
                    `;
                    tbody.appendChild(tr);
                    
                    // Simular busca de preço (Aqui integraríamos com API real)
                    fetchLivePrice(isinTicker, csvPrice);
                }
            });
            document.getElementById('marketCard').style.display = 'block';
            document.getElementById('cardPort').style.display = 'block';
        }});
    });

    async function fetchLivePrice(tickerIsin, csvPrice) {
        // Nota: APIs reais de stock exigem chaves. 
        // Vou usar um gerador de variação para demonstrar o visual, 
        // pois APIs diretas no browser sem Proxy costumam ser bloqueadas.
        setTimeout(() => {
            const mockChange = (Math.random() * 4 - 2); // Simula variação de -2% a +2%
            const livePrice = csvPrice + (csvPrice * (mockChange/100));
            
            const priceEl = document.getElementById(`price-${tickerIsin}`);
            const changeEl = document.getElementById(`change-${tickerIsin}`);
            
            priceEl.innerText = livePrice.toFixed(2) + "€";
            changeEl.innerText = (mockChange > 0 ? "+" : "") + mockChange.toFixed(2) + "%";
            changeEl.className = mockChange > 0 ? "up" : "down";
        }, 1000 + Math.random() * 2000);
    }
</script>
</body>
</html>
