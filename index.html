<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Dividendos DEGIRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .stats { display: flex; justify-content: center; margin-bottom: 30px; }
        .stat-card { background: #f8fff9; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #2ecc71; min-width: 250px; }
        .stat-card h3 { margin: 10px 0 0; color: #2ecc71; font-size: 2.5em; }
        input[type="file"] { margin: 20px 0; padding: 20px; border: 2px dashed #2ecc71; width: 100%; border-radius: 8px; cursor: pointer; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>💰 Dashboard de Dividendos</h1>
        <p>Carregue o ficheiro <strong>Account.csv</strong> (ou Transactions) da DEGIRO</p>
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <div class="stats">
        <div class="stat-card">
            <p>Total Recebido (Líquido)</p>
            <h3 id="totalValue">0.00€</h3>
        </div>
    </div>

    <canvas id="dividendChart"></canvas>
</div>

<script>
    let myChart;

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                processData(results.data);
            }
        });
    });

    function processData(data) {
        const monthlyData = {};
        let totalGlobal = 0;

        data.forEach(row => {
            const desc = (row['Descrição'] || row['Description'] || "").toLowerCase();
            const dataBruta = row['Data'] || row['Date'];
            const valorStr = row['Valor'] || row['Total'] || row['Total EUR'] || "0";
            
            // Tratamento de números formato Europeu (1.234,56)
            const valorTotal = parseFloat(valorStr.toString().replace(/\./g, '').replace(',', '.'));

            if (desc.includes('dividendo') && !isNaN(valorTotal) && valorTotal > 0) {
                const partes = dataBruta.split('-');
                if (partes.length === 3) {
                    const mesAno = partes[1] + '/' + partes[2];
                    monthlyData[mesAno] = (monthlyData[mesAno] || 0) + valorTotal;
                    totalGlobal += valorTotal;
                }
            }
        });

        const sortedKeys = Object.keys(monthlyData).sort((a, b) => {
            const [m1, y1] = a.split('/').map(Number);
            const [m2, y2] = b.split('/').map(Number);
            return new Date(y1, m1 - 1) - new Date(y2, m2 - 1);
        });

        updateDashboard(totalGlobal, sortedKeys, sortedKeys.map(k => monthlyData[k]));
    }

    function updateDashboard(total, labels, values) {
        document.getElementById('totalValue').innerText = total.toLocaleString('pt-PT', { style: 'currency', currency: 'EUR' });
        const ctx = document.getElementById('dividendChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Dividendos Mensais (€)',
                    data: values,
                    backgroundColor: '#2ecc71'
                }]
            }
        });
    }
</script>
</body>
</html>
