<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard Financeiro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #3498db; 
            --primary-dark: #2980b9; 
            --primary-light: #ebf5fb;
            --dark: #2c3e50; 
            --bg: #f4f7f9; 
            --sidebar-w: 240px; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: var(--sidebar-w); background: white; border-right: 1px solid #e1e8ed; display: flex; flex-direction: column; padding: 20px 0; z-index: 10; }
        .sidebar-logo { padding: 0 25px 30px; font-weight: 800; font-size: 1.2em; color: var(--dark); border-bottom: 1px solid #f0f0f0; margin-bottom: 20px; }
        .nav-btn { padding: 15px 25px; cursor: pointer; border: none; background: none; text-align: left; font-size: 0.95em; font-weight: 600; color: #7f8c8d; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .nav-btn:hover { background: #f8f9fa; color: var(--primary); }
        .nav-btn.active { background: var(--primary-light); color: var(--primary); border-right: 4px solid var(--primary); }
        .clear-nav { margin-top: auto; color: #e74c3c; padding: 15px 25px; font-weight: bold; cursor: pointer; font-size: 0.85em; border: none; background: none; }

        /* MAIN CONTENT */
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .tab-content { display: none; max-width: 900px; margin: auto; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        .top-upload-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; background: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); align-items: center; }
        .upload-field label { font-size: 0.65em; font-weight: 800; color: #bdc3c7; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #ddd; margin-right: 5px; }
        .status-ok { background: #2ecc71 !important; }

        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .total-display { font-size: 2.5em; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
        
        /* LISTA TICKERS */
        .ticker-group { border: 1px solid #f0f2f5; border-radius: 12px; margin-bottom: 10px; overflow: hidden; background: white; cursor: pointer; transition: 0.2s; }
        .ticker-group:hover { border-color: var(--primary); }
        .ticker-header { display: flex; justify-content: space-between; padding: 18px 20px; align-items: center; }
        .ticker-name { font-weight: 700; color: var(--dark); font-size: 0.95em; display: flex; align-items: center; gap: 8px; }
        .ticker-total { font-weight: 800; color: var(--primary); }
        
        .broker-tag { font-size: 0.65em; padding: 3px 7px; border-radius: 4px; font-weight: 800; }
        .tag-degiro { background: #f0f0f0; color: #666; }
        .tag-xtb { background: #2c3e50; color: #fff; }

        .ticker-details { display: none; background: #fcfdfe; padding: 15px 20px; border-top: 1px solid #f0f2f5; }
        .ticker-group.open .ticker-details { display: block; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.85em; border-bottom: 1px solid #f4f7f9; color: #666; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo">Insights Financeiros</div>
        <button class="nav-btn active" onclick="switchTab('tab-div', this)">💰 Dividendos</button>
        <button class="nav-btn" onclick="switchTab('tab-port', this)">📊 Portefólio</button>
        <button class="clear-nav" onclick="clearData()">Limpar Memória</button>
    </div>

    <div class="main-content">
        <div class="top-upload-bar">
            <div class="upload-field">
                <label><span id="dot-degiro" class="status-dot"></span>DEGIRO (Account.csv)</label>
                <input type="file" id="fileDegiro">
            </div>
            <div class="upload-field">
                <label><span id="dot-xtb" class="status-dot"></span>XTB (Cash Operations.csv)</label>
                <input type="file" id="fileXtb">
            </div>
            <div class="upload-field">
                <label><span id="dot-port" class="status-dot"></span>CARTEIRA (Portfolio.csv)</label>
                <input type="file" id="filePortfolio">
            </div>
        </div>

        <div id="tab-div" class="tab-content active">
            <div class="card">
                <h2 style="font-size: 0.8em; color: #95a5a6; margin-bottom: 5px;">DIVIDENDOS CONSOLIDADOS</h2>
                <div id="totalDivValue" class="total-display">0.00€</div>
                <canvas id="chartDiv" style="max-height: 250px; margin-bottom: 30px;"></canvas>
                <h3 style="font-size: 0.85em; color: var(--dark); border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 5px; margin-bottom: 20px;">DETALHE POR ATIVO</h3>
                <div id="dividendTickerContainer"></div>
            </div>
        </div>

        <div id="tab-port" class="tab-content">
            <div class="card">
                <h2>Alocação de Portefólio</h2>
                <div id="portfolioListContainer">Carregue o ficheiro da carteira...</div>
            </div>
        </div>
    </div>

<script>
    let chartDiv;
    let dividendsData = { degiro: [], xtb: [] };

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    window.onload = () => {
        const d = localStorage.getItem('divs_degiro'), x = localStorage.getItem('divs_xtb');
        if(d) { dividendsData.degiro = JSON.parse(d); document.getElementById('dot-degiro').classList.add('status-ok'); }
        if(x) { dividendsData.xtb = JSON.parse(x); document.getElementById('dot-xtb').classList.add('status-ok'); }
        if(d || x) processAllDividends();
    };

    function clearData() { if(confirm("Apagar todos os dados?")) { localStorage.clear(); location.reload(); } }

    // --- LOGICA DEGIRO ---
    document.getElementById('fileDegiro').onchange = (e) => {
        Papa.parse(e.target.files[0], { header: true, complete: (res) => { 
            dividendsData.degiro = res.data;
            localStorage.setItem('divs_degiro', JSON.stringify(res.data));
            document.getElementById('dot-degiro').classList.add('status-ok');
            processAllDividends();
        }});
    };

    // --- LOGICA XTB (COM FIX PARA CABEÇALHO) ---
    document.getElementById('fileXtb').onchange = (e) => {
        Papa.parse(e.target.files[0], { 
            complete: (res) => {
                // Encontrar a linha que contém "Type" (o cabeçalho real)
                const headerIndex = res.data.findIndex(row => row.includes("Type") && row.includes("Amount"));
                if (headerIndex === -1) {
                    alert("Erro: Não foi possível encontrar o cabeçalho no ficheiro XTB.");
                    return;
                }
                
                const headers = res.data[headerIndex];
                const rows = res.data.slice(headerIndex + 1);
                
                // Converter para objeto usando os cabeçalhos encontrados
                const formattedData = rows.map(row => {
                    let obj = {};
                    headers.forEach((h, i) => obj[h] = row[i]);
                    return obj;
                });

                dividendsData.xtb = formattedData.filter(r => r.Type);
                localStorage.setItem('divs_xtb', JSON.stringify(dividendsData.xtb));
                document.getElementById('dot-xtb').classList.add('status-ok');
                processAllDividends();
            }
        });
    };

    function processAllDividends() {
        const monthly = {}, tickerSummary = {};
        let totalGlobal = 0;

        // Processar DEGIRO
        dividendsData.degiro.forEach(r => {
            const desc = (r['Descrição']||"").toLowerCase();
            if(desc.includes("dividendo") && !desc.includes("imposto") && !desc.includes("retido")) {
                const val = parseFloat(Object.values(r).find(v => v?.includes(',') && !isNaN(parseFloat(v.replace('.','').replace(',','.'))))?.replace('.','').replace(',','.') || 0);
                if(val <= 0) return;
                const ticker = r['Produto'] || "Outros";
                const date = r['Data'] || "";
                updateStats(ticker, val, date, 'DEGIRO', tickerSummary, monthly);
                totalGlobal += val;
            }
        });

        // Processar XTB
        dividendsData.xtb.forEach(r => {
            const type = (r['Type'] || "").toLowerCase();
            if(type === "dividend") {
                const val = parseFloat((r['Amount'] || "0").toString().replace(',','.'));
                if(val <= 0) return;
                const ticker = r['Instrument'] || "Outros";
                const dateRaw = r['Time'] || "";
                const date = dateRaw.split(' ')[0].replace(/\./g, '-'); // Normaliza 2026.01.06 para 2026-01-06
                updateStats(ticker, val, date, 'XTB', tickerSummary, monthly);
                totalGlobal += val;
            }
        });

        renderUI(totalGlobal, monthly, tickerSummary);
    }

    function updateStats(ticker, val, date, broker, summary, monthly) {
        if(!summary[ticker]) summary[ticker] = { total: 0, broker, dates: [] };
        summary[ticker].total += val;
        summary[ticker].dates.push({ date, val });

        const parts = date.split('-');
        const ma = parts.length >= 2 ? `${parts[1]}/${parts[0]}` : "Outros";
        monthly[ma] = (monthly[ma] || 0) + val;
    }

    function renderUI(total, monthly, summary) {
        document.getElementById('totalDivValue').innerText = total.toLocaleString('pt-PT',{style:'currency',currency:'EUR'});
        
        const labs = Object.keys(monthly).sort();
        if(chartDiv) chartDiv.destroy();
        chartDiv = new Chart(document.getElementById('chartDiv'), { 
            type:'bar', data: { labels: labs, datasets:[{label:'€', data: labs.map(l=>monthly[l].toFixed(2)), backgroundColor:'#3498db', borderRadius: 5}] } 
        });

        const sorted = Object.entries(summary).sort((a,b) => b[1].total - a[1].total);
        document.getElementById('dividendTickerContainer').innerHTML = sorted.map(([name, info]) => `
            <div class="ticker-group" onclick="this.classList.toggle('open')">
                <div class="ticker-header">
                    <span class="ticker-name">
                        ${name} 
                        <span class="broker-tag ${info.broker === 'XTB' ? 'tag-xtb' : 'tag-degiro'}">${info.broker}</span>
                    </span>
                    <span class="ticker-total">${info.total.toFixed(2)}€</span>
                </div>
                <div class="ticker-details">
                    ${info.dates.sort((a,b) => new Date(b.date) - new Date(a.date))
                        .map(d => `<div class="detail-row"><span>${d.date}</span><strong>+${d.val.toFixed(2)}€</strong></div>`).join('')}
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
