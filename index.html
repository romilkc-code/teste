<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard Financeiro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --bg: #f4f7f9; --sidebar-w: 240px; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-w); background: white; border-right: 1px solid #e1e8ed; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar-logo { padding: 0 25px 30px; font-weight: 800; font-size: 1.2em; color: var(--dark); border-bottom: 1px solid #f0f0f0; }
        .nav-btn { padding: 15px 25px; cursor: pointer; border: none; background: none; text-align: left; font-weight: 600; color: #7f8c8d; }
        .nav-btn.active { background: #ebf5fb; color: var(--primary); border-right: 4px solid var(--primary); }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .top-upload-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .upload-field label { font-size: 0.65em; font-weight: 800; color: #95a5a6; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .status-badge { font-size: 0.6em; padding: 2px 6px; border-radius: 10px; background: #eee; margin-left: 5px; }
        .status-ok { background: #2ecc71; color: white; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .total-display { font-size: 2.8em; font-weight: 800; color: var(--dark); margin: 10px 0; }
        .ticker-group { border: 1px solid #f0f2f5; border-radius: 12px; margin-bottom: 10px; background: white; cursor: pointer; }
        .ticker-header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; }
        .ticker-name { font-weight: 700; color: var(--dark); display: flex; align-items: center; gap: 10px; }
        .broker-tag { font-size: 0.6em; padding: 2px 6px; border-radius: 4px; font-weight: 900; text-transform: uppercase; }
        .tag-xtb { background: #1a1a1a; color: #ffca28; }
        .tag-degiro { background: #e74c3c; color: white; }
        .ticker-details { display: none; background: #fcfdfe; padding: 15px 20px; border-top: 1px solid #f0f2f5; }
        .ticker-group.open .ticker-details { display: block; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.85em; border-bottom: 1px solid #f4f7f9; color: #666; }
        #logConsole { background: #2c3e50; color: #2ecc71; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.75em; margin-top: 20px; max-height: 150px; overflow-y: auto; display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo">DASHBOARD V3.1</div>
        <button class="nav-btn active">💰 Dividendos</button>
        <button class="nav-btn" style="color:#e74c3c; margin-top: auto;" onclick="localStorage.clear(); location.reload();">Limpar Tudo</button>
    </div>

    <div class="main-content">
        <div class="top-upload-bar">
            <div class="upload-field">
                <label>DEGIRO <span id="s-degiro" class="status-badge">Pendente</span></label>
                <input type="file" id="f-degiro">
            </div>
            <div class="upload-field">
                <label>XTB <span id="s-xtb" class="status-badge">Pendente</span></label>
                <input type="file" id="f-xtb">
            </div>
            <div class="upload-field">
                <label>PORTEFÓLIO <span id="s-port" class="status-badge">Pendente</span></label>
                <input type="file" id="f-port">
            </div>
        </div>

        <div class="card">
            <h2 style="font-size: 0.8em; color: #95a5a6;">TOTAL DIVIDENDOS RECEBIDOS</h2>
            <div id="totalDivValue" class="total-display">0.00€</div>
            <canvas id="chartDiv" style="max-height: 200px;"></canvas>
        </div>

        <div id="dividendTickerContainer"></div>
        <div id="logConsole">> Consola de sistema pronta...<br></div>
    </div>

<script>
    let dividends = { degiro: [], xtb: [] };
    let chartObj;

    const log = (msg) => {
        const c = document.getElementById('logConsole');
        c.innerHTML += `> ${msg}<br>`;
        c.scrollTop = c.scrollHeight;
    };

    window.onload = () => {
        const d = localStorage.getItem('d_degiro'), x = localStorage.getItem('d_xtb');
        if(d) { dividends.degiro = JSON.parse(d); document.getElementById('s-degiro').className = 'status-badge status-ok'; }
        if(x) { dividends.xtb = JSON.parse(x); document.getElementById('s-xtb').className = 'status-badge status-ok'; }
        processData();
    };

    document.getElementById('f-degiro').onchange = (e) => {
        Papa.parse(e.target.files[0], { header: true, complete: (res) => {
            dividends.degiro = res.data;
            localStorage.setItem('d_degiro', JSON.stringify(res.data));
            document.getElementById('s-degiro').className = 'status-badge status-ok';
            processData();
            log("DEGIRO carregada.");
        }});
    };

    document.getElementById('f-xtb').onchange = (e) => {
        // Leitura em bruto para encontrar o cabeçalho manualmente
        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            // Tenta identificar o separador (vírgula ou ponto e vírgula)
            const sep = text.includes(';') ? ';' : ',';
            
            Papa.parse(text, {
                delimiter: sep,
                skipEmptyLines: true,
                complete: (res) => {
                    const data = res.data;
                    // Procura a linha que contém "Type" e "Instrument" ignorando espaços
                    let headerIdx = data.findIndex(row => 
                        row.some(cell => cell && cell.toString().trim() === "Type")
                    );
                    
                    if(headerIdx === -1) {
                        log("ERRO: Não encontrei a coluna 'Type'. Certifica-te que carregaste o ficheiro 'Cash Operations'.");
                        return;
                    }

                    // Normaliza os cabeçalhos (remove espaços)
                    const headers = data[headerIdx].map(h => h.trim());
                    const rows = data.slice(headerIdx + 1);
                    
                    const formatted = rows.map(r => {
                        let obj = {};
                        headers.forEach((h, i) => obj[h] = r[i]);
                        return obj;
                    }).filter(r => r.Type);

                    dividends.xtb = formatted;
                    localStorage.setItem('d_xtb', JSON.stringify(formatted));
                    document.getElementById('s-xtb').className = 'status-badge status-ok';
                    processData();
                    log(`XTB: ${formatted.length} linhas processadas.`);
                }
            });
        };
        reader.readAsText(e.target.files[0]);
    };

    function processData() {
        const summary = {}, monthly = {};
        let grandTotal = 0;

        // DEGIRO
        dividends.degiro.forEach(r => {
            const desc = (r['Descrição'] || "").toLowerCase();
            if(desc.includes("dividendo") && !desc.includes("imposto")) {
                const valStr = Object.values(r).find(v => v?.includes(',') && !isNaN(parseFloat(v.replace(',','.'))));
                const val = parseFloat(valStr?.toString().replace('.','').replace(',','.') || 0);
                if(val > 0) {
                    addEntry(summary, monthly, r['Produto'] || "Outros", val, r['Data'], 'DEGIRO');
                    grandTotal += val;
                }
            }
        });

        // XTB
        dividends.xtb.forEach(r => {
            if((r['Type'] || "").trim().toLowerCase() === "dividend") {
                const val = parseFloat(r['Amount']?.toString().replace(',','.') || 0);
                if(val > 0) {
                    const date = (r['Time'] || "").split(' ')[0].replace(/\./g, '-');
                    addEntry(summary, monthly, r['Instrument'] || "Outros", val, date, 'XTB');
                    grandTotal += val;
                }
            }
        });

        updateUI(grandTotal, summary, monthly);
    }

    function addEntry(summary, monthly, ticker, val, date, broker) {
        if(!summary[ticker]) summary[ticker] = { total: 0, broker, dates: [] };
        summary[ticker].total += val;
        summary[ticker].dates.push({ date, val });
        const m = date.split('-')[1] + '/' + date.split('-')[0];
        monthly[m] = (monthly[m] || 0) + val;
    }

    function updateUI(total, summary, monthly) {
        document.getElementById('totalDivValue').innerText = total.toLocaleString('pt-PT', {style:'currency', currency:'EUR'});
        const labels = Object.keys(monthly).sort();
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(document.getElementById('chartDiv'), {
            type: 'bar',
            data: { labels, datasets: [{ label: '€', data: labels.map(l => monthly[l]), backgroundColor: '#3498db', borderRadius: 4 }] }
        });

        const container = document.getElementById('dividendTickerContainer');
        container.innerHTML = Object.entries(summary).sort((a,b) => b[1].total - a[1].total).map(([name, info]) => `
            <div class="ticker-group" onclick="this.classList.toggle('open')">
                <div class="ticker-header">
                    <span class="ticker-name">${name} <span class="broker-tag tag-${info.broker.toLowerCase()}">${info.broker}</span></span>
                    <span class="ticker-total">${info.total.toFixed(2)}€</span>
                </div>
                <div class="ticker-details">
                    ${info.dates.map(d => `<div class="detail-row"><span>${d.date}</span><strong>+${d.val.toFixed(2)}€</strong></div>`).join('')}
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
